name: Deploy Frontend via CodeDeploy

on:
  push:
    branches: [main]
    paths:
      - "FrontEnd/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FrontEnd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare deployment bundle
        run: |
          mkdir -p ../frontend-deploy
          cp -r dist ../frontend-deploy/dist
          cp appspec.yml ../frontend-deploy/appspec.yml
          mkdir -p ../frontend-deploy/scripts
          cp -r scripts/* ../frontend-deploy/scripts/
          cd ../frontend-deploy
          zip -r frontend-deploy.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Upload bundle to S3
        run: |
          aws s3 cp ../frontend-deploy/frontend-deploy.zip \
          s3://qwerty-azit-codedeploy-artifacts/frontend/frontend-deploy-${{ github.sha }}.zip

      - name: Create CodeDeploy deployment
        run: |
          aws deploy create-deployment \
            --application-name Qwerty-Azit-Deploy \
            --deployment-group-name Frontend-Web \
            --s3-location bucket=qwerty-azit-codedeploy-artifacts,bundleType=zip,key=frontend/frontend-deploy-${{ github.sha }}.zip \
            --file-exists-behavior OVERWRITE
