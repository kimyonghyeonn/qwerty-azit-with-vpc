version: 0.0
os: linux

files:
  - source: /build/libs/app.jar
    destination: /srv/app/backend

permissions:
  - object: /srv/app/backend
    owner: ec2-user
    group: ec2-user
    mode: 755
    type:
      - directory

  - object: /srv/app/backend/app.jar
    owner: ec2-user
    group: ec2-user
    mode: 644
    type:
      - file

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      runas: ec2-user

  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: ec2-user

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 60
      runas: ec2-user

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 60
      runas: ec2-user

  ValidateService:
    - location: scripts/validate.sh
      timeout: 120
      runas: ec2-user
